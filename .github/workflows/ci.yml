name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  verify:
    name: build / vet / lint / race / coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kindlelaunch
          POSTGRES_PASSWORD: kindlelaunch
          POSTGRES_DB: kindlelaunch_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kindlelaunch"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://kindlelaunch:kindlelaunch@localhost:5432/kindlelaunch_test?sslmode=disable
      TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: binary
          args: --version

      - name: build
        run: make build

      - name: vet
        run: make vet

      - name: gofmt check
        run: make fmt-check

      - name: lint
        run: make lint

      - name: race tests
        run: make race

      - name: coverage gate
        run: make cover-check
