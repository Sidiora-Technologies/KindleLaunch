version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - sqlclosecheck
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # Pure micro-optimizations (pass-by-pointer / avoid loop-var copies). They
        # add churn to public signatures and hot loops with no correctness impact,
        # so they are advisory rather than gating.
        - hugeParam
        - rangeValCopy
    gosec:
      excludes:
        - G115
    govet:
      disable:
        - fieldalignment
        # shadow is off-by-default upstream due to a high false-positive rate on
        # idiomatic `:=` re-binding of err; enable-all pulls it in but it only
        # adds noise, so keep it off.
        - shadow
      enable-all: true
    revive:
      rules:
        - name: exported
        - name: context-as-argument
          # *testing.T legitimately precedes context.Context in test helpers, which
          # is the idiomatic Go test signature; allow it (the rule's documented
          # escape hatch) rather than forcing an un-idiomatic param order.
          arguments:
            - allowTypesBefore: "*testing.T"
        - name: error-return
        - name: error-naming
        - name: unexported-return
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files relax style/idiom linters that add noise without improving test
      # correctness (extends the original gosec/errcheck relaxation). Real-bug
      # linters (staticcheck, govet, etc.) stay on for tests.
      - linters:
          - errcheck
          - gocritic
          - gosec
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
